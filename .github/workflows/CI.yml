name: CI
env:
  DEBUG: napi:*
  APP_NAME: clipboard
  MACOSX_DEPLOYMENT_TARGET: '10.13'
  CARGO_INCREMENTAL: '1'
permissions:
  contents: write
  id-token: write
'on':
  push:
    branches:
      - main
    tags-ignore:
      - '**'
    paths-ignore:
      - '**/*.md'
      - LICENSE
      - '**/*.gitignore'
      - .editorconfig
      - docs/**
  pull_request: null
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish release to npm'
        required: false
        default: false
        type: boolean
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check-version:
    name: Check if version release
    runs-on: ubuntu-latest
    outputs:
      is-version-release: ${{ steps.check.outputs.is-version-release }}
    steps:
      - uses: actions/checkout@v4
      - name: Check commit message
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.publish }}" == "true" ]]; then
            echo "is-version-release=true" >> $GITHUB_OUTPUT
            echo "✅ Manual publish trigger detected"
          elif git log -1 --pretty=%B | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$"; then
            echo "is-version-release=true" >> $GITHUB_OUTPUT
            echo "✅ Version release detected"
          else
            echo "is-version-release=false" >> $GITHUB_OUTPUT
            echo "❌ Not a version release, skipping build"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.is-version-release == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install dependencies
        run: npm install --no-package-lock
      - name: Oxlint
        run: yarn lint
      - name: Cargo fmt
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: yarn build --target x86_64-apple-darwin
          - host: windows-latest
            build: yarn build --target x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: yarn build --target x86_64-unknown-linux-gnu --use-napi-cross
          - host: macos-latest
            target: aarch64-apple-darwin
            build: yarn build --target aarch64-apple-darwin
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: yarn build --target aarch64-unknown-linux-gnu --use-napi-cross
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: yarn build --target aarch64-pc-windows-msvc
    name: stable - ${{ matrix.settings.target }} - node@22
    runs-on: ${{ matrix.settings.host }}
    needs: check-version
    if: needs.check-version.outputs.is-version-release == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}
      - uses: goto-bus-stop/setup-zig@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        with:
          version: 0.14.1
      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild
      - name: Setup toolchain
        run: ${{ matrix.settings.setup }}
        if: ${{ matrix.settings.setup }}
        shell: bash
      - name: Install dependencies
        run: npm install --no-package-lock
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            ${{ env.APP_NAME }}.*.node
            ${{ env.APP_NAME }}.*.wasm
          if-no-files-found: error
  test-macOS-windows-binding:
    name: Test bindings on ${{ matrix.settings.target }} - node@${{ matrix.node }}
    needs:
      - check-version
      - build
    if: needs.check-version.outputs.is-version-release == 'true'
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
          - host: windows-11-arm
            target: aarch64-pc-windows-msvc
            architecture: arm64
          - host: macos-latest
            target: aarch64-apple-darwin
            architecture: arm64
          - host: macos-latest
            target: x86_64-apple-darwin
            architecture: x64
        node:
          - '20'
          - '22'
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn
          architecture: ${{ matrix.settings.architecture }}
      - name: Install dependencies
        run: npm install --no-package-lock
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: .
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Test bindings
        run: yarn test
  test-linux-binding:
    name: Test ${{ matrix.target }} - node@${{ matrix.node }}
    needs:
      - check-version
      - build
    if: needs.check-version.outputs.is-version-release == 'true'
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
        node:
          - '20'
          - '22'
    runs-on: ${{ contains(matrix.target, 'aarch64') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn
      - name: Output docker params
        id: docker
        run: |
          node -e "
            if ('${{ matrix.target }}'.startsWith('aarch64')) {
              console.log('PLATFORM=linux/arm64')
            } else if ('${{ matrix.target }}'.startsWith('armv7')) {
              console.log('PLATFORM=linux/arm/v7')
            } else {
              console.log('PLATFORM=linux/amd64')
            }
          " >> $GITHUB_OUTPUT
          node -e "
            if ('${{ matrix.target }}'.endsWith('-musl')) {
              console.log('IMAGE=node:${{ matrix.node }}-alpine')
            } else {
              console.log('IMAGE=node:${{ matrix.node }}-slim')
            }
          " >> $GITHUB_OUTPUT
      - name: Install dependencies
        run: npm install --no-package-lock
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: .
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: ${{ contains(matrix.target, 'armv7') }}
        with:
          platforms: all
      - run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
        if: ${{ contains(matrix.target, 'armv7') }}
      - name: Test bindings
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ steps.docker.outputs.IMAGE }}
          options: '-v ${{ github.workspace }}:${{ github.workspace }} -w ${{ github.workspace }} --platform ${{ steps.docker.outputs.PLATFORM }}'
          run: yarn test
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - check-version
      - lint
      - test-macOS-windows-binding
      - test-linux-binding
    if: always() && needs.check-version.outputs.is-version-release == 'true' && needs.lint.result == 'success' && needs.test-macOS-windows-binding.result == 'success' && (needs.test-linux-binding.result == 'success' || needs.test-linux-binding.result == 'failure' || needs.test-linux-binding.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - name: Install dependencies
        run: npm install --no-package-lock
      - name: create npm dirs
        run: yarn napi create-npm-dirs
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Move artifacts
        run: yarn artifacts
      - name: List packages
        run: ls -R ./npm
        shell: bash
      - name: Configure npm auth
        run: |
          npm config set provenance true
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - name: Publish platform packages
        run: |
          echo "📦 Publishing platform packages..."
          yarn napi prepublish -t npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Verify platform packages on npm
        run: |
          node <<'EOF'
          const { execFileSync } = require('node:child_process')
          const { readFileSync } = require('node:fs')

          const RETRIES = 12
          const INTERVAL_MS = 5000
          const pkg = JSON.parse(readFileSync('./package.json', 'utf8'))
          const optionalDeps = pkg.optionalDependencies || {}
          const entries = Object.entries(optionalDeps)

          if (entries.length === 0) {
            throw new Error('No optionalDependencies found in package.json after prepublish')
          }

          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms))

          const fetchPublishedVersion = (name, version) => {
            try {
              const output = execFileSync(
                'npm',
                ['view', `${name}@${version}`, 'version', '--json', '--registry=https://registry.npmjs.org'],
                { encoding: 'utf8', stdio: ['ignore', 'pipe', 'pipe'] },
              ).trim()

              const parsed = JSON.parse(output)
              return Array.isArray(parsed) ? parsed[parsed.length - 1] : parsed
            } catch {
              return null
            }
          }

          ;(async () => {
            const failed = []
            for (const [name, version] of entries) {
              let ok = false
              for (let i = 1; i <= RETRIES; i++) {
                const published = fetchPublishedVersion(name, version)
                if (published === version) {
                  console.log(`✅ ${name}@${version} is available`)
                  ok = true
                  break
                }
                console.log(`⏳ waiting ${name}@${version} (${i}/${RETRIES})`)
                if (i < RETRIES) {
                  await sleep(INTERVAL_MS)
                }
              }
              if (!ok) {
                failed.push(`${name}@${version}`)
              }
            }

            if (failed.length > 0) {
              console.error('❌ Missing platform packages on npm:')
              for (const item of failed) {
                console.error(`  - ${item}`)
              }
              process.exit(1)
            }

            console.log('✅ All platform packages are visible on npm')
          })().catch((err) => {
            console.error(err)
            process.exit(1)
          })
          EOF
      - name: Publish main package
        run: |
          echo "📦 Publishing version release..."
          npm publish --access public --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
